name: Annual Ecosystem Audit

on:
  schedule:
    # 每年 1 月 1 日 00:00 UTC 运行
    - cron: '0 0 1 1 *'
  workflow_dispatch:
    inputs:
      year:
        description: '审计年份 (如 2026)'
        required: false
        default: ''

jobs:
  annual-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ecosystem stats update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-ecosystem-stats.js

      - name: Run npm stats update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/npm-stats.js fetch-all

      - name: Run matrix data update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-matrix-data.js

      - name: Generate annual audit report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUDIT_YEAR: ${{ github.event.inputs.year || '' }}
        run: |
          YEAR=${AUDIT_YEAR:-$(date +%Y)}
          echo "# JS/TS 生态年度趋势审计报告 $YEAR" > ECOSYSTEM_TRENDS_${YEAR}.md
          echo "" >> ECOSYSTEM_TRENDS_${YEAR}.md
          echo "> 生成日期: $(date -Iseconds)" >> ECOSYSTEM_TRENDS_${YEAR}.md
          echo "> 审计范围: JavaScript/TypeScript 生态系统全栈" >> ECOSYSTEM_TRENDS_${YEAR}.md
          echo "" >> ECOSYSTEM_TRENDS_${YEAR}.md
          cat scripts/annual-ecosystem-audit-template.md >> ECOSYSTEM_TRENDS_${YEAR}.md

      - name: Check for outdated content
        run: |
          echo "## 内容时效性检查" >> audit_output.txt
          echo "" >> audit_output.txt
          # 检查最后更新日期超过 6 个月的文档
          find docs -name "*.md" -mtime +180 -type f | head -20 | while read f; do
            echo "- ⚠️ 可能过时: $f" >> audit_output.txt
          done
          # 检查对比矩阵中的版本号
          grep -r "TypeScript 5\.[0-7]" docs/comparison-matrices/ || true >> audit_output.txt
          grep -r "Next.js 14" docs/comparison-matrices/ || true >> audit_output.txt
          cat audit_output.txt

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          YEAR=${AUDIT_YEAR:-$(date +%Y)}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "annual-audit-${YEAR}"
          git add -A
          git commit -m "📊 ${YEAR} 年度生态趋势审计报告" || echo "No changes to commit"
          git push origin "annual-audit-${YEAR}" || echo "Push failed"

      - name: Create Issue for manual review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          YEAR=${AUDIT_YEAR:-$(date +%Y)}
          gh issue create \
            --title "📊 ${YEAR} 年度生态趋势审计 — 需要人工审阅" \
            --body "年度生态审计数据已自动收集完成，PR 已创建。请维护者完成以下检查：
          
          - [ ] 检查对比矩阵中的版本号是否最新
          - [ ] 检查新出现的重要工具是否需要收录
          - [ ] 检查是否有内容需要归档或删除
          - [ ] 审阅 ECOSYSTEM_TRENDS_${YEAR}.md 的内容质量
          - [ ] 更新 Tech Radar 中的技术采纳状态" \
            --label "audit,annual-review" || echo "Issue creation skipped"
