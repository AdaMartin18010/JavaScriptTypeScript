name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'website/**'
      - '20-code-lab/**'
      - '10-fundamentals/**'
      - '50-examples/**'
      - '30-knowledge-base/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'website/**'
      - '20-code-lab/**'
      - '10-fundamentals/**'
      - '50-examples/**'
      - '30-knowledge-base/**'
      - '.github/workflows/ci.yml'

jobs:
  build-docs:
    name: Build VitePress Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: website
        run: npm install

      - name: Build documentation
        working-directory: website
        run: npm run docs:build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vitepress-dist
          path: website/.vitepress/dist

  validate-examples:
    name: Validate Example Projects
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate example READMEs exist
        run: |
          for dir in 50-examples/*/; do
            if [ ! -f "$dir/README.md" ]; then
              echo "❌ Missing README.md in $dir"
              exit 1
            fi
          done
          echo "✅ All examples have README.md"

      - name: Validate example package.json structure
        run: |
          for dir in 50-examples/*/; do
            if [ ! -f "$dir/package.json" ]; then
              echo "⚠️ No package.json in $dir (may be non-Node example)"
            fi
          done

  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check COMPLETE_DOCUMENTATION_INDEX.md is up to date
        run: |
          if [ ! -f "COMPLETE_DOCUMENTATION_INDEX.md" ]; then
            echo "❌ COMPLETE_DOCUMENTATION_INDEX.md missing"
            exit 1
          fi
          echo "✅ Documentation index exists"

      - name: Check critical docs exist
        run: |
          for doc in README.md CONTRIBUTING.md SECURITY.md GLOSSARY.md; do
            if [ ! -f "$doc" ]; then
              echo "❌ Missing $doc"
              exit 1
            fi
          done
          echo "✅ All critical docs present"
