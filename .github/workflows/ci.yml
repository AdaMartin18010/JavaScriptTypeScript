name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'jsts-code-lab/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'jsts-code-lab/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 23.x]
        shard: [1, 2]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: jsts-code-lab/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: jsts-code-lab
        run: pnpm install --frozen-lockfile

      - name: Run type check
        working-directory: jsts-code-lab
        run: pnpm type-check

      - name: Run linter
        working-directory: jsts-code-lab
        run: pnpm lint

      - name: Run tests
        working-directory: jsts-code-lab
        run: pnpm vitest --coverage --shard=${{ matrix.shard }}/2

      - name: Upload coverage
        if: matrix.node-version == '22.x'
        uses: codecov/codecov-action@v4
        with:
          directory: jsts-code-lab/coverage
          flags: unittests
          name: codecov-umbrella
