name: Content Quality Check

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    # 每周一 UTC 00:00 运行
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  content-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run link checker
        run: node 60-meta-content/ci-checks/link-checker.js

      - name: Run version audit
        run: node 60-meta-content/ci-checks/version-audit.js

      - name: Run cross-reference validator
        run: node 60-meta-content/ci-checks/cross-reference-validator.js

      - name: Run all checks (summary)
        run: node 60-meta-content/ci-checks/run-all-checks.js

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-quality-reports
          path: |
            60-meta-content/ci-checks/link-check-report.json
            60-meta-content/ci-checks/version-audit-report.json
            60-meta-content/ci-checks/cross-reference-report.json
            60-meta-content/ci-checks/quality-report.json
