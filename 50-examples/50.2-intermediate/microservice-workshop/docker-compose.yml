version: "3.9"

services:
  # ─────────────────────────────────────────
  # 消息总线: NATS
  # ─────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: workshop-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "-js -m 8222"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - workshop-net

  # ─────────────────────────────────────────
  # 注册中心/缓存: Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: workshop-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - workshop-net

  # ─────────────────────────────────────────
  # 数据库: PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: workshop-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: workshop
      POSTGRES_PASSWORD: workshop
      POSTGRES_DB: microservice_workshop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workshop -d microservice_workshop"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - workshop-net

  # ─────────────────────────────────────────
  # 链路追踪: Jaeger
  # ─────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: workshop-jaeger
    ports:
      - "16686:16686"
      - "14250:14250"
      - "14268:14268"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - workshop-net

volumes:
  postgres_data:

networks:
  workshop-net:
    driver: bridge
