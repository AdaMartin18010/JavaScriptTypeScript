name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 01:00 运行
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and Close Stale Items
    runs-on: ubuntu-latest
    
    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          # Token 配置
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          
          # 启用/禁用
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 7
          
          # Issues 配置
          stale-issue-message: |
            ## ⏰ 此 Issue 已被标记为不活跃
            
            由于 **60 天** 内没有活动，此 Issue 已被自动标记为 `stale`。
            
            - 如果这个问题仍然存在，请添加评论以保持 Issue 活跃
            - **14 天后** 如果没有进一步活动，此 Issue 将被自动关闭
            - 如有需要，可以添加 `pinned` 或 `security` 标签来避免自动标记
            
            感谢您的贡献！🙏
          
          close-issue-message: |
            ## 🔒 此 Issue 已自动关闭
            
            由于在被标记为 `stale` 后 **14 天** 内没有进一步活动，此 Issue 已被自动关闭。
            
            - 如果问题仍然存在，请重新打开此 Issue 或创建新的 Issue
            - 请确保提供最新的重现步骤和环境信息
            
            感谢您的理解！🙏
          
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,enhancement,bug,help wanted'
          
          # PRs 配置
          stale-pr-message: |
            ## ⏰ 此 Pull Request 已被标记为不活跃
            
            由于 **30 天** 内没有活动，此 PR 已被自动标记为 `stale`。
            
            - 如果仍在处理中，请推送更新或添加评论以保持 PR 活跃
            - **7 天后** 如果没有进一步活动，此 PR 将被自动关闭
            - 可以添加 `wip` 或 `draft` 标签来避免自动标记
            
            感谢您的贡献！🙏
          
          close-pr-message: |
            ## 🔒 此 Pull Request 已自动关闭
            
            由于在被标记为 `stale` 后 **7 天** 内没有进一步活动，此 PR 已被自动关闭。
            
            - 如果仍需合并，请重新打开此 PR 并解决任何冲突
            - 建议在重新打开前同步最新的主分支变更
            
            感谢您的贡献！🙏
          
          stale-pr-label: 'stale'
          exempt-pr-labels: 'wip,draft,pinned'
          
          # 其他配置
          remove-stale-when-updated: true
          delete-branch: false
          
          # 操作限制
          operations-per-run: 100
          
          # 调试模式
          debug-only: false
          
          # 标签配置
          labels-to-add-when-unstale: ''
          
      # 额外的自定义步骤：统计并报告
      - name: Report Stale Statistics
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            // 获取 stale 标签的 issues 和 PRs
            const staleIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'stale',
              state: 'open'
            });
            
            console.log(`📊 Stale 统计报告:`);
            console.log(`- Stale Issues: ${staleIssues.data.filter(i => !i.pull_request).length}`);
            console.log(`- Stale PRs: ${staleIssues.data.filter(i => i.pull_request).length}`);
            
            // 可以在这里添加更多自定义逻辑，比如发送通知等
