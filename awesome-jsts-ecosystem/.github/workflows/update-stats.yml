name: Update Stats

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 运行
  workflow_dispatch:
    inputs:
      force_update:
        description: '强制更新（无视最小变化阈值）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  NODE_VERSION: '20'

jobs:
  update:
    name: Update Library Stats
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          cd scripts
          npm install @octokit/graphql || npm install @octokit/graphql --save
      
      - name: Update stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_UPDATE: ${{ github.event.inputs.force_update || 'false' }}
        run: node scripts/update-stats.js
      
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ 没有需要更新的内容"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📝 检测到变更，准备提交"
          fi
      
      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update library stats [skip ci]'
          title: '🤖 Auto Update: Library Stats'
          body: |
            ## 📊 自动更新库统计信息
            
            此 PR 由 GitHub Actions 自动生成。
            
            ### 更新内容
            - GitHub Stars 数量
            - 最后更新时间
            - README 徽章数据
            
            ### 更新时间
            ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            
            ---
            > 🤖 自动化工作流: `.github/workflows/update-stats.yml`
          branch: auto-update/stats
          delete-branch: true
          labels: |
            automated
            documentation
          
      - name: Auto-merge if no conflicts
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "✅ PR 已创建，等待审核合并"
          echo "如需自动合并，请在仓库设置中启用 'Allow auto-merge'"
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-stats-logs
          path: logs/
          retention-days: 7
