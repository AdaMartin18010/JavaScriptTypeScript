version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./data/prod.db
      - DEFAULT_MODEL_PROVIDER=${DEFAULT_MODEL_PROVIDER:-openai}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-4o}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
    volumes:
      - ./data:/app/data
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiagent
      POSTGRES_PASSWORD: aiagent
      POSTGRES_DB: aiagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mcp-filesystem:
    build:
      context: ./mcp-servers/filesystem-server
    volumes:
      - ./data/mcp-files:/data
    environment:
      - MCP_ROOT=/data

  mcp-github:
    build:
      context: ./mcp-servers/github-server
    environment:
      - GITHUB_TOKEN=${MCP_GITHUB_TOKEN}

volumes:
  postgres_data:
