<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Master — 里程碑 1：原生 JavaScript</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <div class="container">
    <h1>📝 Todo Master</h1>
    <p class="subtitle">里程碑 1：原生 JavaScript + DOM</p>

    <form id="todo-form" class="todo-form">
      <input
        id="todo-input"
        type="text"
        placeholder="输入待办事项，按回车添加..."
        autocomplete="off"
        required
      />
      <button type="submit">添加</button>
    </form>

    <ul id="todo-list" class="todo-list"></ul>

    <footer class="stats">
      <span id="todo-count">0 个待办</span>
      <button id="clear-completed" class="clear-btn" hidden>清除已完成</button>
    </footer>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
