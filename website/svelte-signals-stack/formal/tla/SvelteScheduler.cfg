CONSTANTS
    MaxSignals = 2
    MaxEffects = 2
    MaxValue = 3

INIT Init
NEXT Next

INVARIANTS
    typeInvariant
    NoDoubleExecution
    ExecutedEffectsAreClean
    VersionConsistency
    ScheduledEffectsAreDirty
    DependencyGraphConsistent

PROPERTIES
    DirtyEffectsScheduled
    FlushEventuallyCompletes
